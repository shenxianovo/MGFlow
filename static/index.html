<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGFlow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3348;
  --text: #e1e4ed;
  --text2: #8b90a5;
  --accent: #6c7cff;
  --accent2: #4e5bbd;
  --green: #34d399;
  --red: #f87171;
  --orange: #fbbf24;
  --blue: #60a5fa;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.main { display: flex; flex: 1; overflow: hidden; }

/* DAG Panel */
.dag-panel { width: 280px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; flex-shrink: 0; }
.dag-panel h2 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 16px 8px; }
.dag-nodes { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
.dag-node { padding: 10px 12px; margin-bottom: 6px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); transition: all 0.3s; }
.dag-node.running { border-color: var(--blue); background: rgba(96,165,250,0.08); }
.dag-node.done { border-color: var(--green); background: rgba(52,211,153,0.08); }
.dag-node.failed { border-color: var(--red); background: rgba(248,113,113,0.08); }
.dag-node.stale { border-color: var(--orange); background: rgba(251,191,36,0.08); }
.dag-node .node-header { display: flex; align-items: center; gap: 8px; }
.dag-node .node-icon { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dag-node.pending .node-icon { background: var(--text2); }
.dag-node.running .node-icon { background: var(--blue); animation: pulse 1.5s infinite; }
.dag-node.done .node-icon { background: var(--green); }
.dag-node.failed .node-icon { background: var(--red); }
.dag-node.stale .node-icon { background: var(--orange); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.dag-node .node-name { font-size: 13px; font-weight: 500; }
.dag-node .node-deps { font-size: 11px; color: var(--text2); margin-top: 4px; }
.dag-node .node-status-text { font-size: 11px; margin-top: 4px; color: var(--text2); }
.dag-node .node-stream { font-size: 11px; margin-top: 6px; color: var(--text); opacity: 0.7; max-height: 60px; overflow: hidden; line-height: 1.4; word-break: break-all; }

/* Chat Panel */
.chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.chat-messages .welcome { text-align: center; margin: auto; color: var(--text2); }
.chat-messages .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
.chat-messages .welcome p { font-size: 14px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.system { align-self: center; background: transparent; color: var(--text2); font-size: 12px; padding: 4px 12px; }
.chat-input-area { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface); }
#chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; resize: none; outline: none; font-family: inherit; max-height: 120px; }
#chat-input:focus { border-color: var(--accent); }
#send-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
#send-btn:hover { background: var(--accent2); }
#send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Preview Panel */
.preview-panel { width: 400px; border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; flex-shrink: 0; }
.preview-panel h2 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 16px 8px; }
.preview-content { flex: 1; padding: 12px; overflow: hidden; }
.preview-content iframe { width: 100%; height: 100%; border: none; border-radius: 8px; background: #fff; }
.preview-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text2); font-size: 14px; border: 1px dashed var(--border); border-radius: 8px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* Node Detail Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 680px; max-height: 80vh; display: flex; flex-direction: column; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-header .modal-meta { font-size: 11px; color: var(--text2); }
.modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 0 4px; }
.modal-close:hover { color: var(--text); }
.modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.log-msg { padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.log-msg.system { background: rgba(108,124,255,0.08); border-left: 3px solid var(--accent); color: var(--text); max-height: 200px; overflow-y: auto; font-size: 12px; }
.log-msg.user { background: rgba(96,165,250,0.08); border-left: 3px solid var(--blue); }
.log-msg.assistant { background: var(--surface2); border-left: 3px solid var(--green); }
.log-msg.tool { background: rgba(251,191,36,0.06); border-left: 3px solid var(--orange); font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
.log-msg .log-role { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; }
.dag-node { cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span>MG</span>Flow</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <div id="project-info" style="font-size:13px;color:var(--text2)">未创建项目</div>
      <button id="project-list-btn" onclick="toggleProjectList()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer">历史项目</button>
    </div>
  </div>
  <div id="project-list-panel" style="display:none;position:absolute;top:48px;right:16px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:360px;max-height:400px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4)">
  </div>
  <div class="main">
    <div class="dag-panel">
      <h2>工作流</h2>
      <div class="dag-nodes" id="dag-nodes"></div>
    </div>
    <div class="chat-panel">
      <div class="chat-messages" id="chat-messages">
        <div class="welcome">
          <h2>开始创作 MG 动画</h2>
          <p>输入你的创意简报，AI 将自动完成整个制作流程</p>
        </div>
      </div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="描述你想要的 MG 动画..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">发送</button>
      </div>
    </div>
    <div class="preview-panel">
      <h2>预览</h2>
      <div class="preview-content" id="preview-content">
        <div class="preview-placeholder">动画渲染完成后将在此处预览</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="node-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3 id="modal-title"></h3>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const DAG_ORDER = [
  'creative_planning', 'script_writing', 'style_setting',
  'storyboard', 'visual_design', 'sound_design',
  'motion_design', 'render'
];
const NODE_LABELS = {
  creative_planning: '创意策划',
  script_writing: '脚本编写',
  style_setting: '风格设定',
  storyboard: '分镜脚本',
  visual_design: '视觉设计',
  sound_design: '音效设计',
  motion_design: '动效设计',
  render: '渲染输出',
};
const STATUS_TEXT = {
  pending: '等待中', running: '执行中', done: '已完成', failed: '失败', stale: '需重做'
};

let projectId = null;
let sending = false;
let currentModalNode = null;

function initDAG() {
  const container = document.getElementById('dag-nodes');
  container.innerHTML = DAG_ORDER.map(name => `
    <div class="dag-node pending" id="node-${name}" onclick="openNodeDetail('${name}')">
      <div class="node-header">
        <div class="node-icon"></div>
        <div class="node-name">${NODE_LABELS[name]}</div>
      </div>
      <div class="node-status-text">${STATUS_TEXT.pending}</div>
      <div class="node-stream" id="stream-${name}"></div>
    </div>
  `).join('');
}

function updateNode(name, status) {
  const el = document.getElementById('node-' + name);
  if (!el) return;
  el.className = 'dag-node ' + status;
  el.querySelector('.node-status-text').textContent = STATUS_TEXT[status] || status;
}

function addMessage(text, role) {
  const container = document.getElementById('chat-messages');
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function ensureProject(brief) {
  if (projectId) return;
  const res = await fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ brief }),
  });
  const data = await res.json();
  projectId = data.project_id;
  document.getElementById('project-info').textContent = '项目: ' + projectId;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || sending) return;

  sending = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  input.style.height = 'auto';
  addMessage(text, 'user');

  try {
    await ensureProject(text);

    const res = await fetch(`/api/projects/${projectId}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          handleSSE(eventType, line.slice(6));
          eventType = '';
        }
      }
    }
  } catch (e) {
    addMessage('连接错误: ' + e.message, 'system');
  } finally {
    sending = false;
    document.getElementById('send-btn').disabled = false;
  }
}

let streamingBubble = null;

function getOrCreateStreamingBubble() {
  if (streamingBubble) return streamingBubble;
  const container = document.getElementById('chat-messages');
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.textContent = '';
  container.appendChild(div);
  streamingBubble = div;
  return div;
}

function finalizeStreamingBubble(fullText) {
  if (streamingBubble) {
    streamingBubble.textContent = fullText || streamingBubble.textContent;
    streamingBubble = null;
  }
}

function handleSSE(event, dataStr) {
  try {
    const data = JSON.parse(dataStr);
    switch (event) {
      case 'orchestrator_token': {
        const bubble = getOrCreateStreamingBubble();
        bubble.textContent += data.token;
        const container = document.getElementById('chat-messages');
        container.scrollTop = container.scrollHeight;
        break;
      }
      case 'message':
        finalizeStreamingBubble(data.message);
        break;
      case 'tool_call':
        finalizeStreamingBubble();
        if (data.tool === 'launch_worker') {
          const node = data.args.node_name;
          updateNode(node, 'running');
          if (data.result.status === 'completed') {
            updateNode(node, 'done');
            clearNodeStream(node);
          } else if (data.result.status === 'failed') {
            updateNode(node, 'failed');
            clearNodeStream(node);
          }
          if (node === 'render' && data.result.status === 'completed') {
            loadPreview();
          }
        } else if (data.tool === 'launch_workers') {
          const results = data.result.results || [];
          for (const r of results) {
            if (r.status === 'completed') {
              updateNode(r.node, 'done');
              clearNodeStream(r.node);
            } else if (r.status === 'failed') {
              updateNode(r.node, 'failed');
              clearNodeStream(r.node);
            }
            if (r.node === 'render' && r.status === 'completed') {
              loadPreview();
            }
          }
        }
        break;
      case 'node_state':
        if (data.node && data.status) {
          updateNode(data.node, data.status);
          if (data.status === 'done' || data.status === 'failed') {
            clearNodeStream(data.node);
          }
          if (currentModalNode === data.node) {
            fetchAndRenderLog(data.node);
          }
        }
        break;
      case 'worker_token': {
        const el = document.getElementById('stream-' + data.node);
        if (el) {
          el.textContent += data.token;
          if (el.textContent.length > 200) {
            el.textContent = el.textContent.slice(-150);
          }
        }
        break;
      }
      case 'worker_progress':
        break;
      case 'worker_need_input': {
        const label = NODE_LABELS[data.node] || data.node;
        addMessage(`[${label}] ${data.question}`, 'system');
        break;
      }
      case 'error':
        finalizeStreamingBubble();
        addMessage('错误: ' + data.message, 'system');
        break;
      case 'done':
        finalizeStreamingBubble();
        break;
    }
  } catch (e) {}
}

function clearNodeStream(name) {
  const el = document.getElementById('stream-' + name);
  if (el) el.textContent = '';
}

async function openNodeDetail(name) {
  if (!projectId) return;
  currentModalNode = name;
  const modal = document.getElementById('node-modal');
  const title = document.getElementById('modal-title');
  const meta = document.getElementById('modal-meta');
  const body = document.getElementById('modal-body');

  title.textContent = NODE_LABELS[name] || name;
  meta.textContent = '加载中...';
  body.innerHTML = '';
  modal.classList.add('open');

  await fetchAndRenderLog(name);
}

async function fetchAndRenderLog(name) {
  const meta = document.getElementById('modal-meta');
  const body = document.getElementById('modal-body');

  try {
    const res = await fetch(`/api/projects/${projectId}/logs/${name}`);
    if (!res.ok) {
      const err = await res.json();
      meta.textContent = '';
      body.innerHTML = `<div style="color:var(--text2);text-align:center;padding:40px 0">${err.detail || '暂无日志'}</div>`;
      return;
    }
    const log = await res.json();
    const start = log.started_at ? new Date(log.started_at).toLocaleTimeString() : '';
    const end = log.completed_at ? new Date(log.completed_at).toLocaleTimeString() : '';
    const dur = log.started_at && log.completed_at
      ? ((new Date(log.completed_at) - new Date(log.started_at)) / 1000).toFixed(1) + 's'
      : '';
    meta.textContent = `${log.status || ''} | ${start} - ${end} | ${dur}`;

    body.innerHTML = '';
    const ROLE_LABELS = { system: 'System Prompt', user: 'User', assistant: 'Assistant', tool: 'Tool Result' };
    for (const msg of log.messages) {
      const role = msg.role || 'unknown';
      const div = document.createElement('div');
      div.className = 'log-msg ' + role;

      const roleLabel = document.createElement('div');
      roleLabel.className = 'log-role';
      roleLabel.textContent = ROLE_LABELS[role] || role;
      div.appendChild(roleLabel);

      const content = document.createElement('div');
      if (role === 'tool') {
        content.textContent = msg.content || '';
      } else if (role === 'assistant' && msg.tool_calls) {
        let text = msg.content || '';
        for (const tc of msg.tool_calls) {
          const fn = tc.function || tc;
          text += `\n[tool_call] ${fn.name || tc.name}(${(fn.arguments || tc.arguments || '').slice(0, 200)})`;
        }
        content.textContent = text;
      } else {
        content.textContent = msg.content || '';
      }
      div.appendChild(content);
      body.appendChild(div);
    }
  } catch (e) {
    meta.textContent = '';
    body.innerHTML = `<div style="color:var(--red);text-align:center;padding:40px 0">加载失败: ${e.message}</div>`;
  }
}

function closeModal() {
  currentModalNode = null;
  document.getElementById('node-modal').classList.remove('open');
}

function loadPreview() {
  if (!projectId) return;
  const container = document.getElementById('preview-content');
  container.innerHTML = `<iframe src="/api/projects/${projectId}/preview"></iframe>`;
}

const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

initDAG();

async function toggleProjectList() {
  const panel = document.getElementById('project-list-panel');
  if (panel.style.display !== 'none') {
    panel.style.display = 'none';
    return;
  }
  panel.innerHTML = '<div style="padding:12px;color:var(--text2);font-size:13px">加载中...</div>';
  panel.style.display = 'block';
  try {
    const res = await fetch('/api/projects');
    const projects = await res.json();
    if (!projects.length) {
      panel.innerHTML = '<div style="padding:16px;color:var(--text2);font-size:13px;text-align:center">暂无项目</div>';
      return;
    }
    panel.innerHTML = projects.map(p => `
      <div onclick="loadProject('${p.project_id}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s"
           onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background='transparent'">
        <div style="font-size:13px;font-weight:500;margin-bottom:2px">${p.brief || '(无简报)'}</div>
        <div style="font-size:11px;color:var(--text2)">${p.project_id} · 进度 ${p.progress}</div>
      </div>
    `).join('');
  } catch (e) {
    panel.innerHTML = `<div style="padding:16px;color:var(--red);font-size:13px">加载失败</div>`;
  }
}

async function loadProject(id) {
  document.getElementById('project-list-panel').style.display = 'none';
  projectId = id;
  document.getElementById('project-info').textContent = '项目: ' + id;
  initDAG();
  const msgContainer = document.getElementById('chat-messages');
  msgContainer.innerHTML = '';
  document.getElementById('preview-content').innerHTML = '<div class="preview-placeholder">动画渲染完成后将在此处预览</div>';

  try {
    const res = await fetch(`/api/projects/${id}/status`);
    const data = await res.json();
    if (data.brief) {
      addMessage(data.brief, 'user');
    }
    const nodes = data.nodes || {};
    for (const [name, info] of Object.entries(nodes)) {
      if (info.status) updateNode(name, info.status);
    }
    if (nodes.render && nodes.render.status === 'done') {
      loadPreview();
    }
  } catch (e) {
    addMessage('加载项目失败: ' + e.message, 'system');
  }
}

document.addEventListener('click', (e) => {
  const panel = document.getElementById('project-list-panel');
  const btn = document.getElementById('project-list-btn');
  if (panel.style.display !== 'none' && !panel.contains(e.target) && e.target !== btn) {
    panel.style.display = 'none';
  }
});
</script>
</body>
</html>
