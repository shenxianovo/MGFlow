<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGFlow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3348;
  --text: #e1e4ed;
  --text2: #8b90a5;
  --accent: #6c7cff;
  --accent2: #4e5bbd;
  --green: #34d399;
  --red: #f87171;
  --orange: #fbbf24;
  --blue: #60a5fa;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.main { display: flex; flex: 1; overflow: hidden; }

/* DAG Panel */
.dag-panel { width: 280px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; flex-shrink: 0; }
.dag-panel h2 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 16px 8px; }
.dag-nodes { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
.dag-node { padding: 10px 12px; margin-bottom: 6px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); transition: all 0.3s; }
.dag-node.running { border-color: var(--blue); background: rgba(96,165,250,0.08); }
.dag-node.done { border-color: var(--green); background: rgba(52,211,153,0.08); }
.dag-node.failed { border-color: var(--red); background: rgba(248,113,113,0.08); }
.dag-node.stale { border-color: var(--orange); background: rgba(251,191,36,0.08); }
.dag-node .node-header { display: flex; align-items: center; gap: 8px; }
.dag-node .node-icon { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dag-node.pending .node-icon { background: var(--text2); }
.dag-node.running .node-icon { background: var(--blue); animation: pulse 1.5s infinite; }
.dag-node.done .node-icon { background: var(--green); }
.dag-node.failed .node-icon { background: var(--red); }
.dag-node.stale .node-icon { background: var(--orange); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.dag-node .node-name { font-size: 13px; font-weight: 500; }
.dag-node .node-deps { font-size: 11px; color: var(--text2); margin-top: 4px; }
.dag-node .node-status-text { font-size: 11px; margin-top: 4px; color: var(--text2); }
.dag-node .node-stream { font-size: 11px; margin-top: 6px; color: var(--text); opacity: 0.7; max-height: 60px; overflow: hidden; line-height: 1.4; word-break: break-all; }

/* Chat Panel */
.chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.chat-messages .welcome { text-align: center; margin: auto; color: var(--text2); }
.chat-messages .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
.chat-messages .welcome p { font-size: 14px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.system { align-self: center; background: transparent; color: var(--text2); font-size: 12px; padding: 4px 12px; }
.chat-input-area { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface); }
#chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; resize: none; outline: none; font-family: inherit; max-height: 120px; }
#chat-input:focus { border-color: var(--accent); }
#send-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
#send-btn:hover { background: var(--accent2); }
#send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Preview Panel */
.preview-panel { width: 400px; border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; flex-shrink: 0; }
.preview-panel h2 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 16px 8px; }
.preview-content { flex: 1; padding: 12px; overflow: hidden; }
.preview-content iframe { width: 100%; height: 100%; border: none; border-radius: 8px; background: #fff; }
.preview-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text2); font-size: 14px; border: 1px dashed var(--border); border-radius: 8px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span>MG</span>Flow</h1>
    <div id="project-info" style="font-size:13px;color:var(--text2)">未创建项目</div>
  </div>
  <div class="main">
    <div class="dag-panel">
      <h2>工作流</h2>
      <div class="dag-nodes" id="dag-nodes"></div>
    </div>
    <div class="chat-panel">
      <div class="chat-messages" id="chat-messages">
        <div class="welcome">
          <h2>开始创作 MG 动画</h2>
          <p>输入你的创意简报，AI 将自动完成整个制作流程</p>
        </div>
      </div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="描述你想要的 MG 动画..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">发送</button>
      </div>
    </div>
    <div class="preview-panel">
      <h2>预览</h2>
      <div class="preview-content" id="preview-content">
        <div class="preview-placeholder">动画渲染完成后将在此处预览</div>
      </div>
    </div>
  </div>
</div>

<script>
const DAG_ORDER = [
  'creative_planning', 'script_writing', 'style_setting',
  'storyboard', 'visual_design', 'sound_design',
  'motion_design', 'render'
];
const NODE_LABELS = {
  creative_planning: '创意策划',
  script_writing: '脚本编写',
  style_setting: '风格设定',
  storyboard: '分镜脚本',
  visual_design: '视觉设计',
  sound_design: '音效设计',
  motion_design: '动效设计',
  render: '渲染输出',
};
const STATUS_TEXT = {
  pending: '等待中', running: '执行中', done: '已完成', failed: '失败', stale: '需重做'
};

let projectId = null;
let sending = false;

function initDAG() {
  const container = document.getElementById('dag-nodes');
  container.innerHTML = DAG_ORDER.map(name => `
    <div class="dag-node pending" id="node-${name}">
      <div class="node-header">
        <div class="node-icon"></div>
        <div class="node-name">${NODE_LABELS[name]}</div>
      </div>
      <div class="node-status-text">${STATUS_TEXT.pending}</div>
      <div class="node-stream" id="stream-${name}"></div>
    </div>
  `).join('');
}

function updateNode(name, status) {
  const el = document.getElementById('node-' + name);
  if (!el) return;
  el.className = 'dag-node ' + status;
  el.querySelector('.node-status-text').textContent = STATUS_TEXT[status] || status;
}

function addMessage(text, role) {
  const container = document.getElementById('chat-messages');
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function ensureProject(brief) {
  if (projectId) return;
  const res = await fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ brief }),
  });
  const data = await res.json();
  projectId = data.project_id;
  document.getElementById('project-info').textContent = '项目: ' + projectId;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || sending) return;

  sending = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  input.style.height = 'auto';
  addMessage(text, 'user');

  try {
    await ensureProject(text);

    const res = await fetch(`/api/projects/${projectId}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          handleSSE(eventType, line.slice(6));
          eventType = '';
        }
      }
    }
  } catch (e) {
    addMessage('连接错误: ' + e.message, 'system');
  } finally {
    sending = false;
    document.getElementById('send-btn').disabled = false;
  }
}

let streamingBubble = null;

function getOrCreateStreamingBubble() {
  if (streamingBubble) return streamingBubble;
  const container = document.getElementById('chat-messages');
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.textContent = '';
  container.appendChild(div);
  streamingBubble = div;
  return div;
}

function finalizeStreamingBubble(fullText) {
  if (streamingBubble) {
    streamingBubble.textContent = fullText || streamingBubble.textContent;
    streamingBubble = null;
  }
}

function handleSSE(event, dataStr) {
  try {
    const data = JSON.parse(dataStr);
    switch (event) {
      case 'orchestrator_token': {
        const bubble = getOrCreateStreamingBubble();
        bubble.textContent += data.token;
        const container = document.getElementById('chat-messages');
        container.scrollTop = container.scrollHeight;
        break;
      }
      case 'message':
        finalizeStreamingBubble(data.message);
        break;
      case 'tool_call':
        finalizeStreamingBubble();
        if (data.tool === 'launch_worker') {
          const node = data.args.node_name;
          updateNode(node, 'running');
          if (data.result.status === 'completed') {
            updateNode(node, 'done');
            clearNodeStream(node);
          } else if (data.result.status === 'failed') {
            updateNode(node, 'failed');
            clearNodeStream(node);
          }
          if (node === 'render' && data.result.status === 'completed') {
            loadPreview();
          }
        }
        break;
      case 'node_state':
        if (data.node && data.status) {
          updateNode(data.node, data.status);
          if (data.status === 'done' || data.status === 'failed') {
            clearNodeStream(data.node);
          }
        }
        break;
      case 'worker_token': {
        const el = document.getElementById('stream-' + data.node);
        if (el) {
          el.textContent += data.token;
          if (el.textContent.length > 200) {
            el.textContent = el.textContent.slice(-150);
          }
        }
        break;
      }
      case 'worker_progress':
        break;
      case 'error':
        finalizeStreamingBubble();
        addMessage('错误: ' + data.message, 'system');
        break;
      case 'done':
        finalizeStreamingBubble();
        break;
    }
  } catch (e) {}
}

function clearNodeStream(name) {
  const el = document.getElementById('stream-' + name);
  if (el) el.textContent = '';
}

function loadPreview() {
  if (!projectId) return;
  const container = document.getElementById('preview-content');
  container.innerHTML = `<iframe src="/api/projects/${projectId}/preview"></iframe>`;
}

const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

initDAG();
</script>
</body>
</html>
